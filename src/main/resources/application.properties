server.port=8080
spring.application.name=healthcare-backend
spring.main.allow-circular-references=true

# H2 Database
spring.datasource.url=jdbc:h2:mem:healthcaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MySQL (uncomment to use MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/healthcaredb?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=./uploads

# Gemini AI
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
gemini.api.key=AIzaSyCUhdssIG-S-0a9YtVozGQgrV_kWcgcBYc

# JWT
jwt.secret=healthcareAISecretKey2024VeryLongAndSecureKey!@#$%
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# CORS
cors.allowed-origins=http://localhost:4200

# AI Memory
ai.memory.max-messages=20
ai.memory.session-timeout=3600

# Logging
logging.level.com.healthcare=DEBUG
logging.level.org.springframework.security=WARN
